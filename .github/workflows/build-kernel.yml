name: Build Kernel

on: 
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'Qurilma kodi'
        required: true
        default: 'taoyao'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libx11-dev lib32z1-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 libncurses-dev gcc-aarch64-linux-gnu

    - name: Download Clang Toolchain
      run: |
        mkdir -p clang
        cd clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz
        tar -xf clang-r522817.tar.gz
        echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

    - name: Clone Kernel Source (LineageOS 21)
      run: |
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8350.git -b lineage-20.0 kernel-source

    - name: GPU Overclocking Patch (640 MHz)
      run: |
        cd kernel-source
        find arch/arm64/boot/dts -type f \( -name "*gpu*.dtsi" -o -name "*adreno*.dtsi" \) | while read file; do
          if [ -f "$file" ]; then
            echo "GPU patch: $file"
            sed -i 's/550000000/640000000/g' "$file"
            sed -i 's/565000000/640000000/g' "$file"
            sed -i 's/608000000/640000000/g' "$file"
            sed -i 's/627000000/640000000/g' "$file"
            sed -i 's/700000000/640000000/g' "$file" 2>/dev/null || true
          fi
        done

    - name: Build Kernel
      run: |
        cd kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        export KBUILD_BUILD_USER="${{ github.actor }}"
        export KBUILD_BUILD_HOST="GitHub-Actions"
        make ${{ github.event.inputs.DEVICE_NAME }}_defconfig
        make -j$(nproc --all)

    - name: Set Properties
      id: props
      run: |
        echo "date=$(TZ=Asia/Tashkent date +%Y%m%d-%I%M%p)" >> $GITHUB_OUTPUT

    - name: Compress Kernel
      run: |
        cd kernel-source/arch/arm64/boot || exit 1
        zip -r9 "${{ github.event.inputs.DEVICE_NAME }}-lineageos21-${{ steps.props.outputs.date }}.zip" ./Image ./Image.gz* ./dtb* 2>/dev/null || zip -r9 "${{ github.event.inputs.DEVICE_NAME }}-lineageos21-${{ steps.props.outputs.date }}.zip" ./Image ./Image.gz* || true

    - name: Release
      uses: ncipollo/release-action@v1.12.0
      with:
        artifacts: kernel-source/arch/arm64/boot/*.zip
        name: "LineageOS 21 Custom Kernel - ${{ steps.props.outputs.date }}"
        draft: false
        prerelease: false
        tag: "los21-kernel-${{ github.run_id }}-${{ steps.props.outputs.date }}"
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## 📱 Xiaomi 12 Lite - LineageOS 21 Custom Kernel
          
          **OS:** LineageOS 21 (Android 14)
          **Device:** Xiaomi 12 Lite (taoyao)
          **GPU Overclock:** 640 MHz ✅
          **Tuzuvchi:** ${{ github.actor }}
          
          ### O'rnatish Qadamlari:
          1. OrangeFox Recovery orqali qayta ishlanadi
          2. Kernel zip faylni flash qiling
          3. Qayta ishlanadi va foydalaning
          
          ⚠️ **Muhim Ogohlik:**
          - Overclocking qurilmangizni yuqoq qilishi mumkin
          - Battery tez tugatilishi mumkin
          - Barcha zararylardan siz javobgarsiz!

    - name: Success Message
      run: |
        echo "✅ LineageOS 21 Kernel muvaffaqiyatli tayyorlandi!"
        echo "📥 Yuklab olish: https://github.com/${{ github.repository }}/releases"
